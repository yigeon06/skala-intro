<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 1. 머리(Head) 영역: 브라우저와 검색 로봇에게 주는 비밀 정보 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 HTML 공부</title> <!-- 웹브라우저 탭에 뜨는 제목 -->
</head>
<body>
    <!-- 2. 몸통(Body) 영역: 실제 화면에 그려질 모든 내용물 -->
    
    <h3>웹 화면에 나오는 진짜 제목</h3>
    <p>여기에 공부한 코드를 작성하시면 됩니다!</p>
    <a href="https://google.com">구글로 이동하는 링크</a>
    
</body>
</html>
